<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Resume_Star.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Star</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        pointer-events: none;
        animation: splashFade 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      #splash img {
        width: 324px;
        height: 324px;
        object-fit: contain;
        animation: splashLogo 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes splashFade {
        0%   { opacity: 1; }
        55%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes splashLogo {
        0%   { opacity: 1; transform: scale(1); }
        55%  { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(0.88); }
      }

      /* ── Nav title: shimmer + flowing glow ── */
      .nav-title-glow {
        background: linear-gradient(
          90deg,
          #c7d8ff 0%,
          #ffffff 20%,
          #e0d0ff 40%,
          #ffffff 60%,
          #a8d4ff 80%,
          #ffffff 100%
        );
        background-size: 250% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: navShimmer 3s linear infinite;
      }
      .nav-title-glow-wrap {
        animation: navGlow 3.5s ease-in-out infinite;
        display: inline-block;
      }
      @keyframes navShimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }
      /* ── Hero title overrides (bigger text = slower, stronger glow) ── */
      .hero-title-glow {
        background: linear-gradient(
          90deg,
          #c7d8ff 0%,
          #ffffff 18%,
          #e0d0ff 36%,
          #ffffff 54%,
          #a8d4ff 72%,
          #ffffff 100%
        );
        background-size: 250% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: navShimmer 4.5s linear infinite;
      }
      .hero-glow-wrap {
        animation: heroGlow 4s ease-in-out infinite;
      }
      @keyframes heroGlow {
        0%, 100% {
          filter:
            drop-shadow(0 0 8px  rgba(147, 197, 253, 0.60))
            drop-shadow(0 0 28px rgba(99,  160, 255, 0.32));
        }
        33% {
          filter:
            drop-shadow(0 0 12px rgba(196, 181, 253, 0.70))
            drop-shadow(0 0 40px rgba(167, 139, 250, 0.40));
        }
        66% {
          filter:
            drop-shadow(0 0 14px rgba(147, 220, 255, 0.75))
            drop-shadow(0 0 48px rgba(56,  189, 248, 0.42));
        }
      }

      @keyframes navGlow {
        0%, 100% {
          filter:
            drop-shadow(0 0 4px rgba(147, 197, 253, 0.55))
            drop-shadow(0 0 14px rgba(99, 160, 255, 0.30));
        }
        33% {
          filter:
            drop-shadow(0 0 7px rgba(196, 181, 253, 0.65))
            drop-shadow(0 0 22px rgba(167, 139, 250, 0.38));
        }
        66% {
          filter:
            drop-shadow(0 0 9px rgba(147, 220, 255, 0.70))
            drop-shadow(0 0 28px rgba(56, 189, 248, 0.40));
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/Resume_Star.png" alt="Resume Star" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      setTimeout(function () {
        var s = document.getElementById('splash');
        if (s) s.remove();
      }, 1700);
    </script>
  </body>
</html>
